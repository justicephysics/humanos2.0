<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empire Collapse Pattern</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow: auto;
        }

        .container {
            width: 750px;
            height: 430px;
            background: rgba(26, 26, 46, 0.95);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            border: 2px solid rgba(255, 107, 107, 0.3);
        }

        .header {
            background: linear-gradient(135deg, #ff6b6b 0%, #c92a2a 100%);
            padding: 15px;
            text-align: center;
        }

        .header h1 {
            color: #ffffff;
            font-size: 1.8em;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header p {
            color: rgba(255, 255, 255, 0.95);
            font-size: 0.9em;
            font-weight: 300;
        }

        .timeline-container {
            padding: 20px;
            position: relative;
            height: 300px;
            overflow-y: auto;
        }

        .timeline-line {
            position: absolute;
            left: 50%;
            top: 50px;
            bottom: 50px;
            width: 4px;
            background: linear-gradient(180deg, #4a9eff 0%, #ff6b6b 100%);
            transform: translateX(-50%);
        }

        .phase {
            position: relative;
            margin-bottom: 30px;
            display: grid;
            grid-template-columns: 1fr 60px 1fr;
            gap: 15px;
            align-items: center;
        }

        .phase:last-child {
            margin-bottom: 0;
        }

        .phase-content {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 15px;
            border: 2px solid;
            position: relative;
        }

        .phase-left {
            text-align: right;
        }

        .phase-right {
            text-align: left;
        }

        .phase-1 .phase-content {
            border-color: #4a9eff;
            background: linear-gradient(135deg, rgba(74, 158, 255, 0.1) 0%, rgba(74, 158, 255, 0.05) 100%);
        }

        .phase-2 .phase-content {
            border-color: #ffd43b;
            background: linear-gradient(135deg, rgba(255, 212, 59, 0.1) 0%, rgba(255, 212, 59, 0.05) 100%);
        }

        .phase-3 .phase-content {
            border-color: #ff6b6b;
            background: linear-gradient(135deg, rgba(255, 107, 107, 0.2) 0%, rgba(255, 107, 107, 0.1) 100%);
            box-shadow: 0 0 30px rgba(255, 107, 107, 0.4);
            animation: pulse-glow 2s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 30px rgba(255, 107, 107, 0.4); }
            50% { box-shadow: 0 0 50px rgba(255, 107, 107, 0.7); }
        }

        .phase-4 .phase-content {
            border-color: #c92a2a;
            background: linear-gradient(135deg, rgba(201, 42, 42, 0.15) 0%, rgba(201, 42, 42, 0.08) 100%);
        }

        .phase-number-container {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        .phase-number {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 1.2em;
            font-weight: bold;
            color: #ffffff;
            border: 3px solid;
            background: #1a1a2e;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.5);
        }

        .phase-1 .phase-number {
            border-color: #4a9eff;
            background: linear-gradient(135deg, #4a9eff 0%, #2a7acc 100%);
        }

        .phase-2 .phase-number {
            border-color: #ffd43b;
            background: linear-gradient(135deg, #ffd43b 0%, #fab005 100%);
        }

        .phase-3 .phase-number {
            border-color: #ff6b6b;
            background: linear-gradient(135deg, #ff6b6b 0%, #ff3838 100%);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .phase-4 .phase-number {
            border-color: #c92a2a;
            background: linear-gradient(135deg, #c92a2a 0%, #8b0000 100%);
        }

        .phase-title {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 8px;
            color: #ffffff;
        }

        .phase-subtitle {
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 10px;
            font-style: italic;
        }

        .phase-description {
            font-size: 0.85em;
            color: rgba(255, 255, 255, 0.85);
            line-height: 1.5;
            margin-bottom: 8px;
        }

        .phase-examples {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        .phase-examples-title {
            font-size: 0.75em;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .phase-examples-list {
            font-size: 0.8em;
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.4;
        }

        .you-are-here {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff6b6b;
            color: #ffffff;
            padding: 10px 30px;
            border-radius: 25px;
            font-size: 1.3em;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 5px 20px rgba(255, 107, 107, 0.5);
            animation: blink 1.5s ease-in-out infinite;
            z-index: 20;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .bottom-section {
            background: rgba(255, 107, 107, 0.1);
            border-top: 3px solid #ff6b6b;
            padding: 40px;
        }

        .timeline-comparison {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            margin-bottom: 40px;
        }

        .timeline-box {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
        }

        .timeline-empire {
            font-size: 1.5em;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 15px;
        }

        .timeline-duration {
            font-size: 2.5em;
            font-weight: bold;
            color: #ff6b6b;
            margin-bottom: 10px;
        }

        .timeline-label {
            font-size: 1em;
            color: rgba(255, 255, 255, 0.7);
        }

        .usa-box {
            border-color: #ff6b6b;
            background: linear-gradient(135deg, rgba(255, 107, 107, 0.15) 0%, rgba(255, 107, 107, 0.05) 100%);
            box-shadow: 0 0 30px rgba(255, 107, 107, 0.3);
        }

        .bottom-message {
            text-align: center;
            padding: 30px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            border: 2px solid rgba(255, 107, 107, 0.3);
        }

        .bottom-message h2 {
            font-size: 2em;
            color: #ff6b6b;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .bottom-message p {
            font-size: 1.2em;
            color: #ffffff;
            line-height: 1.8;
            margin-bottom: 15px;
        }

        .hashtag {
            color: #4a9eff;
            font-size: 1.2em;
            margin-top: 20px;
            font-weight: bold;
        }

        @media (max-width: 968px) {
            .phase {
                grid-template-columns: 1fr;
                grid-template-rows: auto auto;
            }

            .timeline-line {
                left: 30px;
            }

            .phase-number-container {
                justify-content: flex-start;
                margin-left: 30px;
                order: 1;
            }

            .phase-content {
                order: 2;
            }

            .phase-left,
            .phase-right {
                text-align: left;
            }

            .timeline-comparison {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 2em;
            }

            .you-are-here {
                font-size: 1em;
                padding: 8px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚠️ EMPIRE COLLAPSE PATTERN ⚠️</h1>
            <p>The 4 Phases That Destroy Every Empire (100% Historical Consistency)</p>
        </div>

        <div class="timeline-container">
            <div class="timeline-line"></div>

        </div>

    </div>
</body>
</html>
